name: Android Build and Telegram Send

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Get APK path
      id: apk_path
      run: echo "path=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)" >> $GITHUB_OUTPUT

    - name: Send APK to Telegram
      run: |
        curl -F document=@${{ steps.apk_path.outputs.path }} \
             -F caption="✅ ControlDroid APK Compilado con éxito. Instálalo para comenzar el acceso remoto." \
             https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendDocument?chat_id=${{ secrets.TELEGRAM_CHAT_ID }}
